<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SecretSafe Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <h1>SecretSafe</h1>
      <p class="hint">Autofill local con PIN</p>

      <label>
        PIN de emparejamiento
        <input id="pairPin" type="text" placeholder="Pega el PIN desde SecretSafe" />
      </label>

      <button id="connectBtn" type="button">Conectar con PIN</button>
      <button id="searchBtn" type="button">Buscar para este sitio</button>
      <p id="status" class="status"></p>
      <p id="sessionInfo" class="session-info"></p>
      <div id="entries" class="entries"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
