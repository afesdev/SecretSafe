<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SecretSafe Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <h1>SecretSafe</h1>
      <p class="hint">Autofill local con PIN</p>

      <label>
        PIN de emparejamiento
        <input id="pairPin" type="text" placeholder="Pega el PIN desde SecretSafe" />
      </label>

      <button id="connectBtn" type="button">Conectar con PIN</button>
      <button id="searchBtn" type="button">Buscar para este sitio</button>
      <p class="hint hint-compact">Guardar manualmente en SecretSafe</p>
      <label>
        Título
        <input id="saveTitle" type="text" placeholder="Ej: Cuenta principal" />
      </label>
      <label>
        Usuario / correo
        <input id="saveUsername" type="text" placeholder="usuario@email.com" />
      </label>
      <label>
        Contraseña
        <input id="savePassword" type="password" placeholder="Contraseña a guardar" />
      </label>
      <label>
        URL (detectada automáticamente)
        <input id="saveUrl" type="text" placeholder="https://sitio.com/login" />
      </label>
      <label>
        Carpeta
        <select id="saveGroup"></select>
      </label>
      <button id="detectBtn" type="button">Detectar desde la página</button>
      <button id="saveBtn" type="button">Guardar en SecretSafe</button>
      <p id="status" class="status"></p>
      <p id="sessionInfo" class="session-info"></p>
      <div id="entries" class="entries"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
